<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>HANABI PLANNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#0a0c14;--sur:#111320;--sur2:#181c2e;
  --bd:#252a40;--ac:#e8874a;--ac2:#7eb8e8;
  --tx:#e8eaf0;--sub:#7a82a0;
  --hdr:40px;--pnl:210px;--mob-bar:0px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Space Mono',monospace;font-size:11px;overflow:hidden;}

/* ヘッダー */
#hdr{height:var(--hdr);display:flex;align-items:center;gap:10px;padding:0 14px;
  border-bottom:1px solid var(--bd);background:var(--bg);position:relative;z-index:100;}
#hdr h1{font-size:12px;color:var(--ac);letter-spacing:.1em;flex:1;}
#hdr .hbtn{background:none;border:1px solid var(--bd);color:var(--sub);border-radius:4px;
  padding:3px 8px;cursor:pointer;font-family:'Space Mono',monospace;font-size:9px;}
#hdr .hbtn:hover{border-color:var(--ac);color:var(--ac);}

/* メインレイアウト */
#wrap{position:fixed;top:var(--hdr);bottom:0;left:0;right:0;display:flex;overflow:hidden;}

/* 左パネル */
#pnl{width:var(--pnl);flex-shrink:0;background:var(--sur);
  border-right:1px solid var(--bd);overflow-y:auto;overflow-x:hidden;padding:8px;}
#pnl::-webkit-scrollbar{width:3px;}
#pnl::-webkit-scrollbar-thumb{background:var(--bd);}

.sec{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--ac);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;margin-top:8px;}
.sec:first-child{margin-top:0;}
.sec::after{content:'';flex:1;height:1px;background:var(--bd);}

.ig{display:flex;flex-direction:column;gap:3px;margin-bottom:5px;}
.ig label{font-size:8.5px;color:var(--sub);}
.ig select,.ig input[type=text],.ig input[type=number]{
  background:var(--sur2);border:1px solid var(--bd);border-radius:4px;
  padding:4px 6px;color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;width:100%;}
.ig select:focus,.ig input:focus{border-color:var(--ac);outline:none;}
.ig select option{background:var(--sur2);}

.pb{background:var(--sur2);border:1px solid var(--bd);border-radius:4px;
  color:var(--tx);padding:4px 7px;cursor:pointer;font-family:'Space Mono',monospace;
  font-size:9px;width:100%;text-align:center;}
.pb:hover{border-color:var(--ac);color:var(--ac);}
.pb.pri{background:rgba(232,135,74,.15);border-color:var(--ac);color:var(--ac);}
.pb.pri:hover{background:rgba(232,135,74,.25);}
.pb.danger{border-color:#e05;color:#e05;}
.pb.danger:hover{background:rgba(238,0,85,.1);}
.pb.sm{padding:3px 6px;font-size:8.5px;}

.row2{display:grid;grid-template-columns:1fr 1fr;gap:4px;}

/* 筒場リスト */
.tube-item{background:var(--sur2);border:1px solid var(--bd);border-radius:4px;
  padding:4px 6px;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.tube-item .ti-name{flex:1;font-size:9.5px;color:var(--tx);min-width:0;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tube-item .ti-nums{font-size:8px;color:var(--sub);}
.tube-item .ti-del{color:var(--sub);cursor:pointer;font-size:11px;flex-shrink:0;padding:0 2px;}
.tube-item .ti-del:hover{color:#e05;}

/* 号数チェックボックスグリッド */
.num-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:4px;}
.num-cb{display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;
  background:var(--sur2);border:1px solid var(--bd);border-radius:3px;padding:3px 2px;}
.num-cb:hover{border-color:var(--sub);}
.num-cb.checked{border-color:var(--ac);background:rgba(232,135,74,.12);}
.num-cb span{font-size:8px;color:var(--sub);pointer-events:none;}
.num-cb.checked span{color:var(--ac);}
.num-cb input{display:none;}

/* 右エリア */
#right{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}

/* 地図 */
#mapbox{flex:1;min-height:0;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

/* 地図モードバッジ */
#map-mode{position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:500;
  display:flex;gap:4px;}
.mm-btn{background:rgba(10,12,20,.85);border:1px solid var(--bd);color:var(--sub);
  border-radius:12px;padding:3px 10px;cursor:pointer;font-family:'Space Mono',monospace;
  font-size:9px;backdrop-filter:blur(4px);}
.mm-btn.active{border-color:var(--ac);color:var(--ac);}
.mm-btn.active.target{border-color:var(--ac2);color:var(--ac2);}

/* シミュレーターパネル */
#sim-panel{flex-shrink:0;border-top:1px solid var(--bd);background:var(--sur);
  display:flex;flex-direction:column;overflow:hidden;}

#sim-header{display:flex;align-items:center;gap:6px;padding:6px 10px;
  border-bottom:1px solid var(--bd);flex-shrink:0;}
#sim-header select{background:var(--sur2);border:1px solid var(--bd);border-radius:4px;
  padding:3px 6px;color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;}
#sim-header select:focus{border-color:var(--ac);outline:none;}
#sim-header select option{background:var(--sur2);}
#sim-header .slabel{font-size:9px;color:var(--sub);}
#sim-header .sx{color:var(--bd);font-size:12px;}

#sim-body{flex:1;min-height:0;display:flex;overflow:hidden;}

/* スライダーパネル（左パネル内） */
#sliders{display:flex;flex-direction:column;gap:6px;}
.sl-row{display:flex;flex-direction:column;gap:2px;}
.sl-row label{font-size:8px;color:var(--sub);display:flex;justify-content:space-between;}
.sl-row label span{color:var(--ac);font-size:8px;}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:3px;
  background:var(--bd);border-radius:2px;outline:none;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;
  border-radius:50%;background:var(--ac);cursor:pointer;}

/* Canvasエリア */
#cv-wrap{flex:1;min-width:0;display:flex;align-items:flex-start;justify-content:flex-start;
  background:#060810;position:relative;overflow:hidden;}
#cv-clip{overflow:hidden;flex-shrink:0;flex-grow:0;position:relative;
  border:1.5px solid var(--ac);box-sizing:border-box;}
#sim-canvas{display:block;background:#060810;flex-shrink:0;flex-grow:0;}

/* 縦横切替ボタン */
.orient-row{display:flex;gap:3px;}
.orient-row .ob{background:var(--sur2);border:1px solid var(--bd);color:var(--sub);
  border-radius:3px;padding:2px 7px;cursor:pointer;font-family:'Space Mono',monospace;
  font-size:8px;}
.orient-row .ob.on{border-color:var(--ac);color:var(--ac);}

/* 情報表示 */
#sim-info{position:absolute;bottom:6px;left:8px;font-size:8px;color:var(--sub);
  line-height:1.6;pointer-events:none;}

/* 断面図エリア */
#diag-wrap{width:200px;flex-shrink:0;background:#060810;border-left:1px solid var(--bd);
  display:flex;flex-direction:column;overflow:hidden;}
#diag-canvas{display:block;}

/* モーダル共通 */
.modal-overlay{display:none;position:fixed;inset:0;z-index:2000;
  background:rgba(0,0,0,.7);align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--sur);border:1px solid var(--bd);border-radius:8px;
  padding:16px;min-width:300px;max-width:90vw;max-height:85vh;overflow-y:auto;}
.modal h2{font-size:11px;color:var(--ac);letter-spacing:.08em;margin-bottom:12px;}
.modal .mig{display:flex;flex-direction:column;gap:3px;margin-bottom:10px;}
.modal .mig label{font-size:8.5px;color:var(--sub);}
.modal .mig input,.modal .mig select{
  background:var(--sur2);border:1px solid var(--bd);border-radius:4px;
  padding:5px 8px;color:var(--tx);font-family:'Space Mono',monospace;font-size:10px;width:100%;}
.modal .mig input:focus,.modal .mig select:focus{border-color:var(--ac);outline:none;}
.modal-btns{display:flex;gap:6px;margin-top:12px;}
.modal-btns .pb{flex:1;}

/* 設定モーダル：号数テーブル */
.num-table{width:100%;border-collapse:collapse;font-size:9px;margin-bottom:8px;}
.num-table th{color:var(--sub);padding:4px 6px;border-bottom:1px solid var(--bd);text-align:left;}
.num-table td{padding:3px 4px;border-bottom:1px solid rgba(37,42,64,.5);}
.num-table input{background:var(--sur2);border:1px solid var(--bd);border-radius:3px;
  padding:2px 4px;color:var(--tx);font-family:'Space Mono',monospace;font-size:9px;width:70px;}
.num-table input:focus{border-color:var(--ac);outline:none;}

/* 地図ポップアップ */
.map-popup{background:var(--sur);border:1px solid var(--bd);border-radius:6px;
  padding:10px;min-width:180px;}
.map-popup h3{font-size:10px;color:var(--ac);margin-bottom:8px;}
.map-popup .mig{display:flex;flex-direction:column;gap:3px;margin-bottom:6px;}
.map-popup .mig label{font-size:8px;color:var(--sub);}
.map-popup .mig input,.map-popup .mig select{
  background:var(--bg);border:1px solid var(--bd);border-radius:3px;
  padding:3px 5px;color:var(--tx);font-family:'Space Mono',monospace;font-size:9px;width:100%;}
.map-popup .mig input:focus,.map-popup .mig select:focus{border-color:var(--ac);outline:none;}
.leaflet-popup-content-wrapper{background:transparent!important;border:none!important;
  box-shadow:none!important;padding:0!important;}
.leaflet-popup-content{margin:0!important;}
.leaflet-popup-tip{background:var(--bd)!important;}

/* スマホ対応 */
@media(max-width:600px){
  :root{--hdr:0px;--mob-bar:44px;}
  #wrap{top:0;bottom:var(--mob-bar);}
  #pnl{display:none;position:fixed;inset:0;top:0;width:100%;z-index:1000;
    background:var(--sur);padding:12px;}
  #pnl.open{display:flex;flex-direction:column;}
  #right{flex-direction:column;}
  #mapbox{flex:none;height:45vh;}
  #sim-panel{flex:1;min-height:0;}
  #sliders{width:120px;}
  #mob-bar{display:flex!important;}
}

#mob-bar{display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mob-bar);
  background:var(--sur);border-top:1px solid var(--bd);
  z-index:900;align-items:center;justify-content:space-around;padding:0 8px;}
#mob-bar .mb-btn{background:none;border:none;color:var(--sub);cursor:pointer;
  font-family:'Space Mono',monospace;font-size:8px;display:flex;flex-direction:column;
  align-items:center;gap:2px;padding:4px 8px;}
#mob-bar .mb-btn.active{color:var(--ac);}
#mob-bar .mb-btn .icon{font-size:16px;}

/* ノーデータ */
.no-data{text-align:center;color:var(--sub);font-size:9px;padding:12px 0;line-height:1.8;}
</style>
</head>
<body>

<!-- ヘッダー -->
<div id="hdr">
  <h1>🎆 HANABI PLANNER</h1>
  <button class="hbtn" onclick="openSettings()">⚙ 設定</button>
</div>

<!-- メインラップ -->
<div id="wrap">

  <!-- 左パネル -->
  <div id="pnl">

    <!-- 花火大会 -->
    <div class="sec">🎆 花火大会</div>
    <div class="ig">
      <label>大会を選択</label>
      <select id="sel-festival" onchange="onFestivalChange()">
        <option value="">-- 大会を選択 --</option>
      </select>
    </div>
    <div class="row2" style="margin-bottom:6px;">
      <button class="pb sm" onclick="openAddFestival()">＋ 新規大会</button>
      <button class="pb sm" id="btn-edit-festival" onclick="openEditFestival()" disabled>✎ 編集</button>
    </div>

    <!-- 筒場 -->
    <div id="tube-section" style="display:none;">
      <div class="sec">🔴 筒場</div>
      <div class="ig">
        <select id="sel-tube" onchange="onTubeChange()">
          <option value="">-- 筒場を選択 --</option>
        </select>
      </div>
      <div class="row2" style="margin-bottom:6px;">
        <button class="pb sm pri" onclick="startAddTube()">＋ 地図で追加</button>
        <button class="pb sm" id="btn-edit-tube" onclick="openEditTube()" disabled>✎ 編集</button>
      </div>
    </div>

    <!-- 対象物 -->
    <div class="sec" style="margin-top:10px;">🏢 対象物</div>
    <div class="ig">
      <label>対象物を選択</label>
      <select id="sel-target" onchange="onTargetChange()">
        <option value="">-- 対象物を選択 --</option>
      </select>
    </div>
    <div class="row2" style="margin-bottom:6px;">
      <button class="pb sm pri" onclick="startAddTarget()">＋ 地図で追加</button>
      <button class="pb sm" id="btn-edit-target" onclick="openEditTarget()" disabled>✎ 編集</button>
    </div>

    <!-- プレビュー操作 -->
    <div class="sec" style="margin-top:10px;">◎ プレビュー操作</div>
    <div class="orient-row" style="margin-bottom:6px;">
      <div class="ob on" id="btn-land" onclick="setCompMode('land')">横</div>
      <div class="ob" id="btn-port" onclick="setCompMode('port')">縦</div>
    </div>
    <div id="sliders">
      <div class="sl-row">
        <label>左右方向 <span id="lbl-az">0°</span></label>
        <input type="range" id="sl-az" min="-60" max="60" value="0" step="1" oninput="onSlider()">
      </div>
      <div class="sl-row">
        <label>上下 <span id="lbl-el">0°</span></label>
        <input type="range" id="sl-el" min="-60" max="60" value="0" step="1" oninput="onSlider()">
      </div>
      <div class="sl-row">
        <label>焦点距離 <span id="lbl-focal">200mm</span></label>
        <input type="range" id="sl-focal" min="24" max="800" value="200" step="1" oninput="onSlider()">
      </div>
    </div>

    <!-- スマホ用閉じるボタン -->
    <div style="margin-top:auto;padding-top:12px;">
      <button class="pb" style="display:none;" id="pnl-close" onclick="closeMobPanel()">✕ 閉じる</button>
    </div>
  </div>

  <!-- 右エリア -->
  <div id="right">

    <!-- 地図 -->
    <div id="mapbox">
      <div id="map"></div>
      <div id="map-mode">
        <button class="mm-btn active" id="mm-none" onclick="setMapMode('none')">📍 通常</button>
        <button class="mm-btn" id="mm-tube" onclick="setMapMode('tube')">🔴 筒場追加</button>
        <button class="mm-btn target" id="mm-target" onclick="setMapMode('target')">🏢 対象物追加</button>
      </div>
      <div id="map-btns" style="display:none;position:absolute;bottom:8px;right:8px;z-index:1000;flex-direction:column;gap:4px;">
        <a id="map-btn-gmap" href="#" target="_blank"
          style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;
          background:#4285f4;border-radius:4px;text-decoration:none;font-size:16px;
          box-shadow:0 2px 6px rgba(0,0,0,.5);" title="Googleマップで開く">🗺</a>
        <a id="map-btn-sv" href="#" target="_blank"
          style="display:flex;align-items:center;justify-content:center;width:32px;height:32px;
          background:#34a853;border-radius:4px;text-decoration:none;font-size:16px;
          box-shadow:0 2px 6px rgba(0,0,0,.5);" title="ストリートビューで開く">👁</a>
      </div>
    </div>

    <!-- シミュレーターパネル -->
    <div id="sim-panel" style="height:45%;">
      <div id="sim-header">
        <span class="slabel" style="color:var(--sub);">◎ プレビュー</span>
      </div>
      <div id="sim-body">
        <div id="cv-wrap">
          <div id="cv-clip">
            <canvas id="sim-canvas"></canvas>
          </div>
          <div id="sim-info"></div>
          <div id="view-info" style="position:absolute;bottom:6px;right:8px;font-size:8px;
            line-height:1.6;pointer-events:none;text-align:right;"></div>
        </div>
        <div id="diag-wrap">
          <canvas id="diag-canvas"></canvas>
        </div>
      </div>
    </div>

  </div><!-- #right -->
</div><!-- #wrap -->

<!-- スマホ用ボトムバー -->
<div id="mob-bar">
  <button class="mb-btn" onclick="toggleMobPanel()">
    <span class="icon">☰</span>登録
  </button>
  <button class="mb-btn active">
    <span class="icon">🎆</span>シミュ
  </button>
</div>

<!-- ===== モーダル: 新規大会 ===== -->
<div class="modal-overlay" id="modal-festival">
  <div class="modal">
    <h2>🎆 花火大会を登録</h2>
    <div class="mig">
      <label>大会名</label>
      <input type="text" id="inp-festival-name" placeholder="例：○○花火大会 2025">
    </div>
    <div class="mig">
      <label>メモ（任意）</label>
      <input type="text" id="inp-festival-memo" placeholder="例：8月15日・淀川">
    </div>
    <div class="modal-btns">
      <button class="pb" onclick="closeModal('modal-festival')">キャンセル</button>
      <button class="pb pri" onclick="saveFestival()">登録</button>
    </div>
  </div>
</div>

<!-- ===== モーダル: 筒場追加（地図クリック後） ===== -->
<div class="modal-overlay" id="modal-tube">
  <div class="modal">
    <h2 id="tube-modal-title">🔴 筒場を登録</h2>
    <div class="mig">
      <label>筒場名</label>
      <input type="text" id="inp-tube-name" placeholder="例：第1筒場・東側">
    </div>
    <div class="mig">
      <label>大会</label>
      <select id="inp-tube-festival"></select>
    </div>
    <div class="mig" id="tube-elev-row">
      <label>地面標高</label>
      <div id="tube-elev-disp" style="font-size:10px;color:var(--ac);padding:3px 0;">取得中…</div>
    </div>
    <div class="mig">
      <label>使用号数（複数選択可）</label>
      <div class="num-grid" id="tube-num-grid"></div>
    </div>
    <div class="modal-btns">
      <button class="pb" onclick="cancelAddTube()">キャンセル</button>
      <button class="pb danger" id="btn-tube-delete" onclick="deleteTubeFromModal()" style="display:none;">削除</button>
      <button class="pb pri" onclick="saveTube()">保存</button>
    </div>
  </div>
</div>

<!-- ===== モーダル: 対象物追加（地図クリック後） ===== -->
<div class="modal-overlay" id="modal-target">
  <div class="modal">
    <h2 id="target-modal-title">🏢 対象物を登録</h2>
    <div class="mig">
      <label>名前</label>
      <input type="text" id="inp-target-name" placeholder="例：通天閣・○○橋">
    </div>
    <div class="mig" id="target-elev-row">
      <label>地面標高</label>
      <div id="target-elev-disp" style="font-size:10px;color:var(--ac2);padding:3px 0;">取得中…</div>
    </div>
    <div class="mig">
      <label>建物高さ (m)</label>
      <input type="number" id="inp-target-height" placeholder="例：103" min="1" max="2000">
    </div>
    <div class="mig">
      <label>幅 (m)　※縦・横共通</label>
      <input type="number" id="inp-target-width" placeholder="例：20" min="1" max="5000">
    </div>
    <div class="mig">
      <label>形状</label>
      <select id="inp-target-shape">
        <option value="box">四角柱</option>
        <option value="cylinder">円柱</option>
        <option value="cone">円錐</option>
      </select>
    </div>
    <div class="mig">
      <label>建物の向き（正面の向く方角）</label>
      <select id="inp-target-frontaz">
        <option value="0">北 (N)</option>
        <option value="45">北東 (NE)</option>
        <option value="90">東 (E)</option>
        <option value="135">南東 (SE)</option>
        <option value="180">南 (S)</option>
        <option value="225">南西 (SW)</option>
        <option value="270">西 (W)</option>
        <option value="315">北西 (NW)</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="pb" onclick="cancelAddTarget()">キャンセル</button>
      <button class="pb danger" id="btn-target-delete" onclick="deleteTargetFromModal()" style="display:none;">削除</button>
      <button class="pb pri" onclick="saveTarget()">保存</button>
    </div>
  </div>
</div>

<!-- ===== モーダル: 設定（号数テーブル） ===== -->
<div class="modal-overlay" id="modal-settings">
  <div class="modal" style="min-width:340px;">
    <h2>⚙ 設定 — 号数テーブル</h2>
    <p style="font-size:8.5px;color:var(--sub);margin-bottom:10px;line-height:1.6;">
      出典：煙火消費保安基準・磯谷煙火店実測データ等。<br>実際の花火は条件によりばらつきがあります。
    </p>
    <table class="num-table" id="num-table">
      <thead><tr><th>号数</th><th>高度(m)</th><th>開花径(m)</th></tr></thead>
      <tbody id="num-table-body"></tbody>
    </table>
    <div class="row2" style="gap:6px;margin-bottom:8px;">
      <button class="pb sm" onclick="resetNumTable()">↺ デフォルトに戻す</button>
      <button class="pb sm pri" onclick="saveNumTable()">保存</button>
    </div>
    <button class="pb" onclick="closeModal('modal-settings')">閉じる</button>
  </div>
</div>

<script>
// ==================== デフォルト号数テーブル ====================
const DEFAULT_NUM_TABLE = [
  {num:'2.5', height:80,  dia:50},
  {num:'3',   height:120, dia:100},
  {num:'4',   height:150, dia:120},
  {num:'5',   height:200, dia:150},
  {num:'6',   height:220, dia:180},
  {num:'7',   height:250, dia:210},
  {num:'8',   height:280, dia:250},
  {num:'10',  height:300, dia:280},
  {num:'20',  height:470, dia:510},
  {num:'30',  height:600, dia:625},
  {num:'40',  height:725, dia:725},
];

// ==================== データストア ====================
let db = {
  festivals: [],   // {id, name, memo}
  tubes: [],       // {id, festivalId, name, lat, lng, nums:[]}
  targets: [],     // {id, name, lat, lng, height}
  numTable: JSON.parse(JSON.stringify(DEFAULT_NUM_TABLE)),
};

function loadDB(){
  try{
    const s = localStorage.getItem('hanabiPlanner');
    if(s){
      const d = JSON.parse(s);
      db.festivals = d.festivals||[];
      db.tubes     = d.tubes||[];
      db.targets   = d.targets||[];
      db.numTable  = d.numTable||JSON.parse(JSON.stringify(DEFAULT_NUM_TABLE));
    }
  }catch(e){}
}
function saveDB(){
  localStorage.setItem('hanabiPlanner', JSON.stringify(db));
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

// ==================== 地図 ====================
let map, mapMode='none';
let pendingMarker=null; // 仮マーカー（クリック後・登録前）
let tubeMarkers=[], targetMarker=null;

function initMap(){
  map = L.map('map',{zoomControl:true}).setView([34.7,135.5],10);

  const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap contributors', maxZoom:19
  });
  const esriLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',{
    attribution:'© Esri, Maxar, Earthstar Geographics', maxZoom:19
  });
  osmLayer.addTo(map);

  // 衛星/地図切替ボタン
  const MapCtrl = L.Control.extend({
    options:{position:'topright'},
    onAdd(){
      const btn = L.DomUtil.create('button');
      btn.innerHTML = '🛰';
      btn.title = '衛星/地図切替';
      btn.style.cssText = 'width:32px;height:32px;background:#1a2035;border:1px solid #3a4060;color:#e8eaf0;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;';
      let isSat = false;
      L.DomEvent.on(btn,'click',L.DomEvent.stopPropagation);
      L.DomEvent.on(btn,'click',()=>{
        isSat = !isSat;
        if(isSat){map.removeLayer(osmLayer);esriLayer.addTo(map);btn.style.background='#2a3a5a';}
        else{map.removeLayer(esriLayer);osmLayer.addTo(map);btn.style.background='#1a2035';}
      });
      return btn;
    }
  });
  new MapCtrl().addTo(map);

  // 現在地ボタン
  const LocCtrl = L.Control.extend({
    options:{position:'topright'},
    onAdd(){
      const btn = L.DomUtil.create('button');
      btn.innerHTML = '📍';
      btn.title = '現在地に移動';
      btn.style.cssText = 'width:32px;height:32px;background:#111320;border:1px solid #3a4060;color:#e8eaf0;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;';
      L.DomEvent.on(btn,'click',L.DomEvent.stopPropagation);
      L.DomEvent.on(btn,'click',()=>{
        if(!navigator.geolocation){alert('Geolocationに対応していません');return;}
        btn.innerHTML='⏳';
        navigator.geolocation.getCurrentPosition(
          pos=>{
            btn.innerHTML='📍';
            map.setView([pos.coords.latitude,pos.coords.longitude],15);
          },
          err=>{btn.innerHTML='📍';alert('現在地取得失敗：'+err.message);},
          {enableHighAccuracy:true,timeout:10000}
        );
      });
      return btn;
    }
  });
  new LocCtrl().addTo(map);

  // URLペーストボタン（GoogleマップURL→地図中心移動）
  const ClipCtrl = L.Control.extend({
    options:{position:'topright'},
    onAdd(){
      const btn = L.DomUtil.create('button');
      btn.innerHTML = '⬇️';
      btn.title = 'GoogleマップURL・座標をクリップボードからペースト';
      btn.style.cssText = 'width:32px;height:32px;background:#111320;border:1px solid #3a4060;color:#e8eaf0;border-radius:4px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;';
      let busy = false;
      L.DomEvent.on(btn,'click',L.DomEvent.stopPropagation);
      L.DomEvent.on(btn,'click',async()=>{
        if(busy) return;
        busy = true;
        btn.innerHTML='⏳'; btn.style.cursor='not-allowed';
        try{
          const text = await navigator.clipboard.readText();
          if(!text||!text.trim()){
            btn.innerHTML='❌';
            setTimeout(()=>{btn.innerHTML='⬇️';btn.style.cursor='pointer';busy=false;},1500);
            return;
          }
          const ok = await extractAndApplyMapsURL(text.trim());
          btn.innerHTML = ok ? '✅' : '❌';
          setTimeout(()=>{btn.innerHTML='⬇️';btn.title='GoogleマップURL・座標をクリップボードからペースト';btn.style.cursor='pointer';busy=false;},2500);
        }catch(e){
          btn.innerHTML='❌';
          setTimeout(()=>{btn.innerHTML='⬇️';btn.style.cursor='pointer';busy=false;},1500);
        }
      });
      return btn;
    }
  });
  new ClipCtrl().addTo(map);

  // スケールバー（メモリ）
  const scaleCtrl = L.control.scale({position:'bottomleft', imperial:false, maxWidth:120});
  scaleCtrl.addTo(map);
  scaleCtrl.getContainer().style.pointerEvents = 'none';

  map.on('click', onMapClick);
}

function setMapMode(mode){
  mapMode = mode;
  ['mm-none','mm-tube','mm-target'].forEach(id=>{
    document.getElementById(id).classList.remove('active');
  });
  document.getElementById('mm-'+mode).classList.add('active');
  map.getContainer().style.cursor = mode==='none'?'':'crosshair';
}

function onMapClick(e){
  const {lat,lng} = e.latlng;

  if(mapMode==='none'){
    // 通常モード: クリック地点を視点として設定しシミュレーション起動
    viewLat = lat;
    viewLng = lng;
    viewManual = true;
    onViewPick();
    return;
  }

  // 仮マーカーを置く
  if(pendingMarker) map.removeLayer(pendingMarker);
  const color = mapMode==='tube'?'#e8874a':'#7eb8e8';
  pendingMarker = L.circleMarker([lat,lng],{
    radius:7,color,fillColor:color,fillOpacity:.7,weight:2
  }).addTo(map);

  if(mapMode==='tube'){
    openAddTubeModal(lat,lng);
  } else if(mapMode==='target'){
    openAddTargetModal(lat,lng);
  }
}

// 視点確定後の処理（標高取得・マーカー更新・シミュレーション起動）
async function onViewPick(){
  if(viewLat===null||viewLng===null) return;

  // 既存マーカー削除
  if(viewMarker){ map.removeLayer(viewMarker); viewMarker=null; }

  // 現行ツールと同じ青丸＋ラベルマーカー（ドラッグ可能）
  viewMarker = L.marker([viewLat, viewLng],{
    icon: L.divIcon({
      html:`<div style="display:flex;align-items:center;gap:4px;">
        <div style="width:12px;height:12px;border-radius:50%;flex-shrink:0;
          background:#7eb8e8;border:2px solid white;box-shadow:0 0 8px #7eb8e8;"></div>
        <div id="vmarker-label" style="background:rgba(10,12,20,.78);border-radius:3px;
          padding:1px 5px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
          color:#7eb8e8;white-space:nowrap;pointer-events:none;line-height:1.5;">取得中…</div>
      </div>`,
      className:'', iconAnchor:[6,6]
    }),
    draggable: true,
    zIndexOffset: 10000
  }).addTo(map);

  viewMarker.on('dragend', e=>{
    const ll = e.target.getLatLng();
    viewLat = ll.lat;
    viewLng = ll.lng;
    onViewPick();
  });

  // 国土地理院から標高取得
  viewElev = 0;
  try{ viewElev = await getElev(viewLat, viewLng); }catch(e){}

  // ラベル更新（筒場・対象それぞれの距離を表示）
  updateViewLabel();

  // シミュレーション更新
  renderSim();
}

function updateViewLabel(){
  const lbl = document.getElementById('vmarker-label');
  if(!lbl) return;
  const fid = document.getElementById('sel-festival').value;
  const tid = document.getElementById('sel-target').value;

  const tg = tid ? db.targets.find(x=>x.id===tid) : null;
  const tubes = fid ? db.tubes.filter(t=>t.festivalId===fid) : [];

  let parts = [];

  // 筒場との距離（各筒場を個別表示）
  tubes.forEach((t,i)=>{
    const d = hav(viewLat,viewLng,t.lat,t.lng);
    const dist = d<1 ? `${Math.round(d*1000)}m` : `${d.toFixed(2)}km`;
    parts.push(`筒${i+1}:${dist}`);
  });

  // 対象物との距離
  if(tg){
    const d = hav(viewLat, viewLng, tg.lat, tg.lng);
    parts.push(`対:${d<1?Math.round(d*1000)+'m':d.toFixed(2)+'km'}`);
  }

  // 標高
  parts.push(`E:${viewElev.toFixed(1)}m`);

  lbl.textContent = parts.join('  ');

  // sim-info下部にも詳細表示
  const infoEl = document.getElementById('view-info');
  if(!infoEl) return;
  if(tubes.length>0 && tg){
    const distLines = tubes.map(t=>{
      const d = hav(viewLat,viewLng,t.lat,t.lng);
      return `${t.name}: ${d<1?Math.round(d*1000)+'m':d.toFixed(2)+'km'}`;
    });
    const dTg = hav(viewLat, viewLng, tg.lat, tg.lng);
    infoEl.innerHTML =
      `<span style="color:var(--ac)">視点標高 ${viewElev.toFixed(1)}m</span>　` +
      distLines.map(s=>`<span style="color:var(--sub)">${s}</span>`).join(' / ') +
      `　<span style="color:var(--ac2)">対象 ${dTg<1?Math.round(dTg*1000)+'m':dTg.toFixed(2)+'km'}</span>`;
  } else {
    infoEl.innerHTML = `<span style="color:var(--ac)">視点標高 ${viewElev.toFixed(1)}m</span>`;
  }
}

// ==================== 花火大会 ====================
let editingFestivalId = null;
let pendingTubeLat=null, pendingTubeLng=null, pendingTubeElev=0;
let pendingTargetLat=null, pendingTargetLng=null, pendingTargetElev=0;

function openAddFestival(){
  editingFestivalId = null;
  document.getElementById('inp-festival-name').value='';
  document.getElementById('inp-festival-memo').value='';
  document.getElementById('modal-festival').querySelector('h2').textContent='🎆 花火大会を登録';
  openModal('modal-festival');
  setTimeout(()=>document.getElementById('inp-festival-name').focus(),100);
}
function openEditFestival(){
  const fid = document.getElementById('sel-festival').value;
  if(!fid) return;
  const f = db.festivals.find(x=>x.id===fid);
  if(!f) return;
  editingFestivalId = fid;
  document.getElementById('inp-festival-name').value=f.name;
  document.getElementById('inp-festival-memo').value=f.memo||'';
  document.getElementById('modal-festival').querySelector('h2').textContent='🎆 大会を編集';
  openModal('modal-festival');
}
function saveFestival(){
  const name = document.getElementById('inp-festival-name').value.trim();
  if(!name){alert('大会名を入力してください');return;}
  const memo = document.getElementById('inp-festival-memo').value.trim();
  if(editingFestivalId){
    const f = db.festivals.find(x=>x.id===editingFestivalId);
    if(f){f.name=name;f.memo=memo;}
  } else {
    db.festivals.push({id:uid(),name,memo});
  }
  saveDB();
  closeModal('modal-festival');
  refreshFestivalSelects();
  // 新規なら最後の大会を選択
  if(!editingFestivalId){
    const last = db.festivals[db.festivals.length-1];
    document.getElementById('sel-festival').value = last.id;
    onFestivalChange();
  } else {
    refreshFestivalSelects();
  }
}

function onFestivalChange(){
  const fid = document.getElementById('sel-festival').value;
  document.getElementById('btn-edit-festival').disabled = !fid;
  const sec = document.getElementById('tube-section');
  sec.style.display = fid ? 'block' : 'none';
  refreshTubeSelect();
  syncSimSelects();
  refreshMapMarkers();
}

function refreshFestivalSelects(){
  const opts = db.festivals.map(f=>`<option value="${f.id}">${escH(f.name)}</option>`).join('');
  const empty = '<option value="">-- 大会を選択 --</option>';
  document.getElementById('sel-festival').innerHTML = empty + opts;
  document.getElementById('inp-tube-festival').innerHTML = opts;
  // 編集中の値を復元
  onFestivalChange();
}

// ==================== 筒場 ====================
function startAddTube(){
  setMapMode('tube');
}
async function openAddTubeModal(lat,lng){
  editingTubeId = null;
  pendingTubeLat=lat; pendingTubeLng=lng; pendingTubeElev=0;
  document.getElementById('tube-modal-title').textContent='🔴 筒場を登録';
  document.getElementById('inp-tube-name').value='';
  document.getElementById('tube-elev-disp').textContent='取得中…';
  document.getElementById('btn-tube-delete').style.display='none';
  // 大会選択を現在選択中に
  const fid = document.getElementById('sel-festival').value;
  const sel = document.getElementById('inp-tube-festival');
  sel.innerHTML = db.festivals.map(f=>`<option value="${f.id}">${escH(f.name)}</option>`).join('');
  if(fid) sel.value=fid;
  buildNumGrid('tube-num-grid',[]);
  openModal('modal-tube');
  setTimeout(()=>document.getElementById('inp-tube-name').focus(),100);
  try{ pendingTubeElev = await getElev(lat,lng); }catch(e){ pendingTubeElev=0; }
  document.getElementById('tube-elev-disp').textContent=`${pendingTubeElev.toFixed(1)} m`;
}
function buildNumGrid(containerId, checked){
  const el = document.getElementById(containerId);
  el.innerHTML = db.numTable.map(row=>{
    const isChecked = checked.includes(row.num);
    return `<label class="num-cb${isChecked?' checked':''}" onclick="toggleNumCb(this)">
      <input type="checkbox" value="${row.num}"${isChecked?' checked':''}>
      <span>${row.num}号</span>
    </label>`;
  }).join('');
}
function toggleNumCb(el){
  const cb = el.querySelector('input');
  cb.checked = !cb.checked;
  el.classList.toggle('checked', cb.checked);
}
function getCheckedNums(containerId){
  return Array.from(document.querySelectorAll(`#${containerId} input:checked`)).map(x=>x.value);
}
function cancelAddTube(){
  closeModal('modal-tube');
  if(pendingMarker){map.removeLayer(pendingMarker);pendingMarker=null;}
  setMapMode('none');
}
let editingTubeId = null; // 編集中の筒場ID（null=新規）

function saveTube(){
  const name = document.getElementById('inp-tube-name').value.trim()||'筒場';
  const fid  = document.getElementById('inp-tube-festival').value;
  const nums = getCheckedNums('tube-num-grid');
  if(!fid){alert('大会を選択してください');return;}
  if(nums.length===0){alert('号数を1つ以上選択してください');return;}
  if(editingTubeId){
    // 編集モード：名前・号数のみ更新（座標・標高は変更しない）
    const t = db.tubes.find(x=>x.id===editingTubeId);
    if(t){ t.name=name; t.nums=nums; t.festivalId=fid; }
  } else {
    // 新規
    db.tubes.push({id:uid(), festivalId:fid, name, lat:pendingTubeLat, lng:pendingTubeLng, nums, elev:pendingTubeElev});
  }
  saveDB();
  closeModal('modal-tube');
  if(!editingTubeId){ pendingMarker=null; setMapMode('none'); }
  editingTubeId=null;
  refreshTubeSelect();
  refreshMapMarkers();
  syncSimSelects();
}
function openEditTube(){
  const tid = document.getElementById('sel-tube').value;
  if(!tid) return;
  const t = db.tubes.find(x=>x.id===tid);
  if(!t) return;
  editingTubeId = tid;
  document.getElementById('tube-modal-title').textContent='🔴 筒場を編集';
  document.getElementById('inp-tube-name').value = t.name;
  const sel = document.getElementById('inp-tube-festival');
  sel.innerHTML = db.festivals.map(f=>`<option value="${f.id}">${escH(f.name)}</option>`).join('');
  sel.value = t.festivalId;
  // 標高表示（既存値）
  document.getElementById('tube-elev-disp').textContent = `${(t.elev||0).toFixed(1)} m`;
  // 号数チェックボックス
  buildNumGrid('tube-num-grid', t.nums||[]);
  // 削除ボタン表示
  document.getElementById('btn-tube-delete').style.display='inline-block';
  openModal('modal-tube');
  setTimeout(()=>document.getElementById('inp-tube-name').focus(),100);
}
function deleteTubeFromModal(){
  if(!editingTubeId) return;
  if(!confirm('この筒場を削除しますか？')) return;
  db.tubes = db.tubes.filter(t=>t.id!==editingTubeId);
  saveDB();
  closeModal('modal-tube');
  editingTubeId=null;
  refreshTubeSelect();
  refreshMapMarkers();
  renderSim();
}
function cancelAddTube(){
  closeModal('modal-tube');
  if(!editingTubeId && pendingMarker){map.removeLayer(pendingMarker);pendingMarker=null;}
  editingTubeId=null;
  setMapMode('none');
}
function refreshTubeSelect(){
  const fid = document.getElementById('sel-festival').value;
  const sel = document.getElementById('sel-tube');
  const tubes = fid ? db.tubes.filter(t=>t.festivalId===fid) : [];
  const prev = sel.value;
  sel.innerHTML = '<option value="">-- 筒場を選択 --</option>' +
    tubes.map(t=>`<option value="${t.id}">${escH(t.name)} (${t.nums.join('/')}号)</option>`).join('');
  if(tubes.find(t=>t.id===prev)) sel.value=prev;
  onTubeChange();
}
function onTubeChange(){
  const tid = document.getElementById('sel-tube').value;
  document.getElementById('btn-edit-tube').disabled = !tid;
}

// ==================== 対象物 ====================
function startAddTarget(){
  setMapMode('target');
}
async function openAddTargetModal(lat,lng){
  pendingTargetLat=lat; pendingTargetLng=lng; pendingTargetElev=0;
  editingTargetId = null;
  document.getElementById('target-modal-title').textContent='🏢 対象物を登録';
  document.getElementById('inp-target-name').value='';
  document.getElementById('inp-target-height').value='';
  document.getElementById('inp-target-shape').value='box';
  document.getElementById('inp-target-width').value='';
  document.getElementById('inp-target-frontaz').value='0';
  document.getElementById('btn-target-delete').style.display='none';
  document.getElementById('target-elev-disp').textContent='取得中…';
  openModal('modal-target');
  setTimeout(()=>document.getElementById('inp-target-name').focus(),100);
  // 標高取得（非同期・モーダル表示後に更新）
  try{ pendingTargetElev = await getElev(lat,lng); }catch(e){ pendingTargetElev=0; }
  document.getElementById('target-elev-disp').textContent=`${pendingTargetElev.toFixed(1)} m`;
}
function cancelAddTarget(){
  closeModal('modal-target');
  if(!editingTargetId && pendingMarker){map.removeLayer(pendingMarker);pendingMarker=null;}
  editingTargetId=null;
  setMapMode('none');
}
function saveTarget(){
  const name    = document.getElementById('inp-target-name').value.trim();
  const height  = parseFloat(document.getElementById('inp-target-height').value);
  const width   = parseFloat(document.getElementById('inp-target-width').value)||20;
  const depth   = width; // 奥行=幅で統一
  const shape   = document.getElementById('inp-target-shape').value||'box';
  const frontAz = parseInt(document.getElementById('inp-target-frontaz').value)||0;
  if(!name){alert('名前を入力してください');return;}
  if(!height||height<=0){alert('高さを入力してください');return;}
  if(editingTargetId){
    // 編集モード：全フィールド更新（座標・標高は変更しない）
    const tg = db.targets.find(x=>x.id===editingTargetId);
    if(tg){ tg.name=name; tg.height=height; tg.width=width; tg.depth=depth; tg.shape=shape; tg.frontAz=frontAz; }
    saveDB();
    closeModal('modal-target');
    editingTargetId=null;
    refreshTargetSelects();
    onTargetChange();
    renderSim();
    return;
  }
  db.targets.push({id:uid(), name, lat:pendingTargetLat, lng:pendingTargetLng, height, elev:pendingTargetElev, shape, width, depth, frontAz});
  saveDB();
  closeModal('modal-target');
  pendingMarker=null;
  setMapMode('none');
  refreshTargetSelects();
  // 新規登録したものを選択
  const last = db.targets[db.targets.length-1];
  document.getElementById('sel-target').value = last.id;
  onTargetChange();
}
let editingTargetId = null; // 編集中の対象物ID（null=新規）

function deleteTargetFromModal(){
  if(!editingTargetId) return;
  if(!confirm('この対象物を削除しますか？')) return;
  db.targets = db.targets.filter(t=>t.id!==editingTargetId);
  saveDB();
  closeModal('modal-target');
  editingTargetId=null;
  refreshTargetSelects();
  onTargetChange();
}
function openEditTarget(){
  const tid = document.getElementById('sel-target').value;
  if(!tid) return;
  const tg = db.targets.find(x=>x.id===tid);
  if(!tg) return;
  editingTargetId = tid;
  document.getElementById('target-modal-title').textContent='🏢 対象物を編集';
  document.getElementById('inp-target-name').value = tg.name;
  document.getElementById('inp-target-height').value = tg.height||'';
  document.getElementById('inp-target-width').value = tg.width||tg.depth||'';
  document.getElementById('inp-target-shape').value = tg.shape||'box';
  document.getElementById('inp-target-frontaz').value = String(tg.frontAz||0);

}

function refreshMapMarkers(){
  // 既存マーカー削除
  tubeMarkers.forEach(m=>map.removeLayer(m));
  tubeMarkers=[];
  if(targetMarker){map.removeLayer(targetMarker);targetMarker=null;}

  const fid = document.getElementById('sel-festival').value;
  const tid = document.getElementById('sel-target').value;

  // 選択中大会の筒場
  if(fid){
    db.tubes.filter(t=>t.festivalId===fid).forEach(t=>{
      const m = L.circleMarker([t.lat,t.lng],{
        radius:8,color:'#e8874a',fillColor:'#e8874a',fillOpacity:.8,weight:2
      }).addTo(map).bindTooltip(`🔴 ${t.name}<br>${t.nums.join('/')}号　標高${(t.elev||0).toFixed(1)}m`,{direction:'top'});
      tubeMarkers.push(m);
    });
  }

  // 選択中対象物
  if(tid){
    const tg = db.targets.find(x=>x.id===tid);
    if(tg){
      targetMarker = L.circleMarker([tg.lat,tg.lng],{
        radius:8,color:'#7eb8e8',fillColor:'#7eb8e8',fillOpacity:.8,weight:2
      }).addTo(map).bindTooltip(`🏢 ${tg.name}<br>建物高 ${tg.height}m　標高 ${(tg.elev||0).toFixed(1)}m`,{direction:'top'});
    }
  }

  // 撮影推奨ラインは最初の筒場と対象物で描画
  drawShootingLine(fid, tid);
}

let shootingLines=[];  // 配列で管理（複数筒場×下線+上線）
let viewMarker=null;   // 視点マーカー
let viewLat=null, viewLng=null, viewManual=false, viewElev=0; // 手動視点・標高
let gCamAlpha=null, gFovV=null; // 断面図共有：カメラ光軸仰角(deg)・垂直画角(deg)
let compMode='land'; // 横構図('land') / 縦構図('port')

// 球面上でlat,lngからaz方向にdistKm進んだ座標を返す
function destPoint(lat, lng, azDeg, distKm){
  const R = 6371;
  const az = azDeg * Math.PI/180;
  const latR = lat * Math.PI/180;
  const dR = distKm / R;
  const lat2 = Math.asin(Math.sin(latR)*Math.cos(dR) + Math.cos(latR)*Math.sin(dR)*Math.cos(az));
  const lng2 = lng + Math.atan2(Math.sin(az)*Math.sin(dR)*Math.cos(latR),
                                 Math.cos(dR)-Math.sin(latR)*Math.sin(lat2))*180/Math.PI;
  return [lat2*180/Math.PI, lng2];
}

function drawShootingLine(fid, tid){
  // 既存ライン全削除
  shootingLines.forEach(l=>map.removeLayer(l));
  shootingLines=[];
  if(!fid||!tid) return;
  const tg = db.targets.find(x=>x.id===tid);
  if(!tg) return;
  const tubes = db.tubes.filter(t=>t.festivalId===fid);
  if(tubes.length===0) return;
  const EXT_KM = 60; // 両端60km延長
  tubes.forEach(tube=>{
    // 筒場→対象の方位角
    const azFwd = brng(tube.lat, tube.lng, tg.lat, tg.lng);
    const azBwd = (azFwd + 180) % 360;
    // 筒場側を60km後方へ延長
    const [fromLat, fromLng] = destPoint(tube.lat, tube.lng, azBwd, EXT_KM);
    // 対象側を60km前方へ延長
    const [toLat, toLng] = destPoint(tg.lat, tg.lng, azFwd, EXT_KM);
    const coords = [[fromLat,fromLng],[tube.lat,tube.lng],[tg.lat,tg.lng],[toLat,toLng]];
    // 下線（黒・太め）
    const under = L.polyline(coords,{color:'#000000',weight:4,opacity:0.5,dashArray:'6,4'}).addTo(map);
    // 上線（アクセントカラー・細め）
    const over  = L.polyline(coords,{color:'#e8874a',weight:2,opacity:0.9,dashArray:'6,4'}).addTo(map);
    shootingLines.push(under, over);
  });
}

// ==================== シミュレーション描画 ====================
const CV_COLORS = ['#e8874a','#f5c842','#7eb8e8','#e87ea8','#7ee8b0','#c87ef5'];

function renderSim(){
  const canvas = document.getElementById('sim-canvas');
  if(!canvas) return;
  // layout()がサイズを設定していなければ先にlayout()を呼ぶ
  if(!canvas.width || canvas.width===0){
    layout();
    return; // layout()末尾でrenderSim()が呼ばれる
  }
  const W = canvas.width;
  const H = canvas.height;
  if(W===0||H===0) return;
  const ctx = canvas.getContext('2d');

  // 背景
  ctx.fillStyle='#060810';
  ctx.fillRect(0,0,W,H);

  const fid = document.getElementById('sel-festival').value;
  const tid = document.getElementById('sel-target').value;
  if(!fid||!tid){
    ctx.fillStyle='#7a82a0';
    ctx.font='11px Space Mono,monospace';
    ctx.textAlign='center';
    ctx.fillText('大会と対象物を選択してください',W/2,H/2);
    document.getElementById('sim-info').textContent='';
    return;
  }

  const tg    = db.targets.find(x=>x.id===tid);
  const tubes = db.tubes.filter(t=>t.festivalId===fid);
  if(!tg||tubes.length===0){
    ctx.fillStyle='#7a82a0';
    ctx.font='11px Space Mono,monospace';
    ctx.textAlign='center';
    ctx.fillText('筒場または対象物が未登録です',W/2,H/2);
    return;
  }

  // 選択中の筒場（左パネルのsel-tubeを使う、なければ最初）
  const selTubeId = document.getElementById('sel-tube') ? document.getElementById('sel-tube').value : '';
  const tube = selTubeId ? tubes.find(t=>t.id===selTubeId)||tubes[0] : tubes[0];

  // 視点パラメータ
  const focal     = parseFloat(document.getElementById('sl-focal').value);
  const azOffDeg  = parseFloat(document.getElementById('sl-az').value);
  const elOffDeg  = parseFloat(document.getElementById('sl-el').value);
  const r = Math.PI/180;

  // gnomonic投影（現行ツールと同方式）
  // センサー35mm換算
  const sensorW=36, sensorH=24;
  // compModeにより縦横のfovを入れ替え（現行ツールと同方式）
  const fovH_deg = compMode==='land' ? 2*Math.atan(sensorW/(2*focal))/r : 2*Math.atan(sensorH/(2*focal))/r;
  const fovV_deg = compMode==='land' ? 2*Math.atan(sensorH/(2*focal))/r : 2*Math.atan(sensorW/(2*focal))/r;
  const f_px_H = W/(2*Math.tan(fovH_deg/2*r));
  const f_px_V = H/(2*Math.tan(fovV_deg/2*r));
  const gnoH = deg => f_px_H * Math.tan(deg*r);
  const gnoV = deg => f_px_V * Math.tan(deg*r);

  // 視点座標
  const mPerDeg = 111000;
  let simViewLat, simViewLng, simViewElev;
  if(viewManual && viewLat!==null){
    simViewLat  = viewLat;
    simViewLng  = viewLng;
    simViewElev = viewElev||0;
  } else {
    // 視点未設定時：地図クリックを促すメッセージのみ表示
    ctx.fillStyle='#7a82a0';
    ctx.font='11px Space Mono,monospace';
    ctx.textAlign='center';
    ctx.fillText('地図をクリックして視点を設定してください',W/2,H/2);
    document.getElementById('sim-info').textContent='';
    return;
  }

  // 仰角計算（現行ツールのelAng相当、簡易版）
  function calcVA(distKm, viewElev, objElev, objHeight){
    return Math.atan2((objElev+objHeight)-viewElev, distKm*1000)*180/Math.PI;
  }
  function calcVABase(distKm, viewElev, objElev){
    return Math.atan2(objElev-viewElev, distKm*1000)*180/Math.PI;
  }

  // 視点→選択筒場の水平距離・方位
  const distTube = hav(simViewLat,simViewLng,tube.lat,tube.lng);
  const azTube   = brng(simViewLat,simViewLng,tube.lat,tube.lng); // カメラの基本方位

  // カメラ方位：基本=視点→選択筒場、±azOffDeg
  const camAz = azTube + azOffDeg;

  // 仰角オフセット
  const camElOfs = elOffDeg;

  // toX: 方位azDiffによる水平gnomonic変換
  const cx = W/2;
  function toX(objLat, objLng){
    const az = brng(simViewLat,simViewLng,objLat,objLng);
    const daz = ((az - camAz + 540)%360) - 180;
    return cx + gnoH(daz);
  }

  // α_cam（カメラ光軸仰角）：対象物の頂点が画面中央に来るよう自動調整
  const tubeElev = tube.elev||0;
  const maxRow = tube.nums.reduce((best,n)=>{
    const row=db.numTable.find(r=>r.num===n);
    return(row&&row.height>(best?best.height:0))?row:best;
  }, null);
  const vaBase = calcVABase(distTube||0.001, simViewElev, tubeElev) + camElOfs;

  // 対象物頂点の仰角を画面中央に合わせる
  const distTgForCam = hav(simViewLat,simViewLng,tg.lat,tg.lng)||0.001;
  const vaTgTopForCam = calcVA(distTgForCam, simViewElev, tg.elev||0, tg.height) + camElOfs;
  // α_cam = 対象頂点の仰角（→ toY(vaTgTopForCam) = H/2 が成立）
  const alpha_cam = vaTgTopForCam * r;
  const toY = alt => H/2 - f_px_V*Math.tan(alt*r - alpha_cam);
  // 断面図用：カメラ光軸仰角・垂直画角をグローバルに共有
  gCamAlpha = vaTgTopForCam; // 度
  gFovV = fovV_deg;          // 度

  // 地平線Y
  const horizonY = toY(0);
  const hY = Math.min(Math.max(horizonY, H*0.3), H*0.85);

  // 空グラデーション
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#060810');
  sky.addColorStop(1,'#0d1422');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);

  // 地面
  ctx.fillStyle='#0a0e1a';
  ctx.fillRect(0,hY,W,H-hY);
  ctx.strokeStyle='rgba(200,169,110,0.4)';
  ctx.lineWidth=1; ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(0,hY); ctx.lineTo(W,hY); ctx.stroke();
  ctx.setLineDash([]);

  // ── 対象物 3D描画（現行ツールのgp方式） ──
  {
    const tgElev   = tg.elev||0;
    const distTg   = hav(simViewLat,simViewLng,tg.lat,tg.lng)||0.001;
    const vaTgTop  = calcVA(distTg, simViewElev, tgElev, tg.height) + camElOfs;
    const vaTgBase = calcVABase(distTg, simViewElev, tgElev) + camElOfs;
    const tgCx     = toX(tg.lat, tg.lng); // 中心X

    // 建物パラメータ（未登録時はデフォルト値）
    const tgShape   = tg.shape   || 'box';
    const tgW       = tg.width   || Math.max(10, tg.height*0.3);
    const tgD       = tg.depth   || tgW;
    const tgFrontAz = tg.frontAz || 0;
    const tgH       = tg.height;
    const TG_TOTAL  = Math.max(1, toY(vaTgBase) - toY(vaTgTop)); // px高さ

    // 視点→対象物の方位 → 建物向きとの相対角
    const viewToTgAz = brng(simViewLat, simViewLng, tg.lat, tg.lng);
    const relDeg = ((viewToTgAz + 180 - tgFrontAz) + 360) % 360;
    const gAngle = relDeg * Math.PI / 180;
    const gSinA  = Math.sin(gAngle), gCosA = Math.cos(gAngle);

    // gp: 3D(x,y,z)m → canvas座標
    // y=0が地面(vaTgBase)、y=tgHが頂点(vaTgTop)
    function tgGp(xm, ym, zm){
      const rx = xm * gCosA - zm * gSinA;
      const rz = xm * gSinA + zm * gCosA;
      const yRatio = ym / tgH;
      const alt_y  = vaTgBase + yRatio * (vaTgTop - vaTgBase);
      const rzCorr = Math.atan2(rz * Math.sin(vaTgTop*Math.PI/180), distTg*1000) * 180/Math.PI;
      const pxY    = toY(alt_y + rzCorr);
      const rxDeg  = Math.atan2(rx, distTg*1000) * 180/Math.PI;
      return [tgCx + gnoH(rxDeg), pxY];
    }

    // 面データ収集してZソート描画（現行ツールと同方式）
    const tgFaces = [];
    function tgAddFace(pts, nx, nz, fillFn, stroke='rgba(126,184,232,0.6)', lw=1.2){
      const dot = nx*gSinA + nz*gCosA;
      if(dot <= 0.02) return;
      const br = 0.45 + dot*0.5;
      const depth = pts.reduce((s,p)=>{
        return s + (p[0]*gSinA + p[2]*gCosA + p[1]);
      }, 0) / pts.length;
      tgFaces.push({
        verts2d: pts.map(p=>tgGp(p[0],p[1],p[2])),
        fill: fillFn(br), stroke, lw, depth
      });
    }

    const hw = tgW/2, hd = tgD/2;

    if(tgShape === 'box'){
      // 四角柱：4側面
      [
        {v:[[-hw,0,-hd],[hw,0,-hd],[hw,tgH,-hd],[-hw,tgH,-hd]], nx:0,  nz:-1},
        {v:[[hw,0,-hd],[hw,0,hd],[hw,tgH,hd],[hw,tgH,-hd]],     nx:1,  nz:0},
        {v:[[-hw,0,hd],[hw,0,hd],[hw,tgH,hd],[-hw,tgH,hd]],     nx:0,  nz:1},
        {v:[[-hw,0,-hd],[-hw,0,hd],[-hw,tgH,hd],[-hw,tgH,-hd]], nx:-1, nz:0},
      ].forEach(f=>{
        tgAddFace(f.v, f.nx, f.nz,
          br=>`rgba(${Math.round(30*br)},${Math.round(80*br)},${Math.round(160*br)},0.75)`);
      });
      // 上面（仰角0以下＝見下ろし時のみ）
      if(vaTgBase < 0){
        const depth = tgFaces.reduce((s,f)=>s+f.depth,0)/Math.max(1,tgFaces.length) - 50;
        tgFaces.push({
          verts2d:[tgGp(-hw,tgH,-hd),tgGp(hw,tgH,-hd),tgGp(hw,tgH,hd),tgGp(-hw,tgH,hd)],
          fill:'rgba(40,100,200,0.5)', stroke:'rgba(126,184,232,0.5)', lw:0.8, depth
        });
      }

    } else if(tgShape === 'cylinder'){
      // 円柱：16分割の側面
      const segs = 16;
      for(let i=0;i<segs;i++){
        const a0 = (i/segs)*Math.PI*2;
        const a1 = ((i+1)/segs)*Math.PI*2;
        const x0=hw*Math.cos(a0), z0=hd*Math.sin(a0);
        const x1=hw*Math.cos(a1), z1=hd*Math.sin(a1);
        // 法線（セグメント中央）
        const am = (a0+a1)/2;
        const nx_raw = Math.cos(am), nz_raw = Math.sin(am);
        // モデル座標での法線をワールドに変換
        const nx_w =  nx_raw*gCosA + nz_raw*gSinA;
        const nz_w = -nx_raw*gSinA + nz_raw*gCosA;
        tgAddFace(
          [[x0,0,z0],[x1,0,z1],[x1,tgH,z1],[x0,tgH,z0]],
          nx_w, nz_w,
          br=>`rgba(${Math.round(30*br)},${Math.round(80*br)},${Math.round(160*br)},0.75)`
        );
      }
      // 上面
      if(vaTgBase < 0){
        const topPts = Array.from({length:16},(_,i)=>[hw*Math.cos(i/16*Math.PI*2),tgH,hd*Math.sin(i/16*Math.PI*2)]);
        const depth = tgFaces.reduce((s,f)=>s+f.depth,0)/Math.max(1,tgFaces.length) - 50;
        tgFaces.push({
          verts2d: topPts.map(p=>tgGp(p[0],p[1],p[2])),
          fill:'rgba(40,100,200,0.5)', stroke:'rgba(126,184,232,0.5)', lw:0.8, depth
        });
      }

    } else if(tgShape === 'cone'){
      // 円錐：16分割の側面（底面→頂点）
      const segs = 16;
      for(let i=0;i<segs;i++){
        const a0 = (i/segs)*Math.PI*2;
        const a1 = ((i+1)/segs)*Math.PI*2;
        const x0=hw*Math.cos(a0), z0=hd*Math.sin(a0);
        const x1=hw*Math.cos(a1), z1=hd*Math.sin(a1);
        const am = (a0+a1)/2;
        const nx_raw = Math.cos(am), nz_raw = Math.sin(am);
        const nx_w =  nx_raw*gCosA + nz_raw*gSinA;
        const nz_w = -nx_raw*gSinA + nz_raw*gCosA;
        tgAddFace(
          [[x0,0,z0],[x1,0,z1],[0,tgH,0]],
          nx_w, nz_w,
          br=>`rgba(${Math.round(30*br)},${Math.round(80*br)},${Math.round(160*br)},0.75)`
        );
      }
    }

    // Zソートして描画
    tgFaces.sort((a,b)=>b.depth-a.depth);
    tgFaces.forEach(f=>{
      ctx.beginPath();
      ctx.moveTo(f.verts2d[0][0], f.verts2d[0][1]);
      for(let i=1;i<f.verts2d.length;i++) ctx.lineTo(f.verts2d[i][0], f.verts2d[i][1]);
      ctx.closePath();
      ctx.fillStyle=f.fill; ctx.fill();
      ctx.strokeStyle=f.stroke; ctx.lineWidth=f.lw; ctx.stroke();
    });

    // ラベル
    const tgTopPx = toY(vaTgTop);
    ctx.font='9px Space Mono,monospace'; ctx.textAlign='center';
    ctx.strokeStyle='rgba(4,6,14,0.85)'; ctx.lineWidth=2.5; ctx.lineJoin='round';
    const tgLabel = `${tg.name} ${(tgElev+tg.height).toFixed(0)}m`;
    ctx.strokeText(tgLabel, tgCx, tgTopPx-6);
    ctx.fillStyle='rgba(126,184,232,0.95)';
    ctx.fillText(tgLabel, tgCx, tgTopPx-6);
  }

  // 各筒場の花火描画
  const CV_COLORS=['#e8874a','#f5c842','#7eb8e8','#e87ea8','#7ee8b0','#c87ef5'];
  tubes.forEach((tb, ti)=>{
    const isSelected = (tb.id === tube.id);
    const color = CV_COLORS[ti % CV_COLORS.length];
    const tbElev  = tb.elev||0;
    const distTb  = hav(simViewLat,simViewLng,tb.lat,tb.lng)||0.001;
    const tbX     = toX(tb.lat, tb.lng);
    const tbBaseY = toY(calcVABase(distTb, simViewElev, tbElev) + camElOfs);

    tb.nums.forEach((numStr, ni)=>{
      const row = db.numTable.find(r=>r.num===numStr);
      if(!row) return;
      const vaFW  = calcVA(distTb, simViewElev, tbElev, row.height) + camElOfs;
      const fwY   = toY(vaFW);
      // 開花半径をgnomonic投影で計算
      const angR  = Math.atan2(row.dia/2, distTb*1000)*180/Math.PI;
      const radPx = Math.max(3, gnoH(angR));

      // 選択中の筒場は不透明、他は半透明
      const alpha = isSelected ? 0.9 : 0.35;

      // 放射状花火
      const rays = 16;
      const innerR = radPx*0.15;
      ctx.strokeStyle = color;
      ctx.globalAlpha = alpha;
      for(let i=0;i<rays;i++){
        const angle = (i/rays)*Math.PI*2;
        ctx.lineWidth = isSelected ? 1.5 : 0.8;
        ctx.beginPath();
        ctx.moveTo(tbX+Math.cos(angle)*innerR, fwY+Math.sin(angle)*innerR);
        ctx.lineTo(tbX+Math.cos(angle)*radPx,  fwY+Math.sin(angle)*radPx);
        ctx.stroke();
        // 枝
        const mid = 0.6;
        ctx.lineWidth = isSelected ? 0.8 : 0.5;
        [[0.3],[-0.3]].forEach(([off])=>{
          ctx.beginPath();
          ctx.moveTo(tbX+Math.cos(angle)*radPx*mid, fwY+Math.sin(angle)*radPx*mid);
          ctx.lineTo(tbX+Math.cos(angle+off)*radPx*0.9, fwY+Math.sin(angle+off)*radPx*0.9);
          ctx.stroke();
        });
      }
      // 開花径の輪郭
      ctx.globalAlpha = alpha*0.25;
      ctx.strokeStyle = color;
      ctx.lineWidth = 0.7;
      ctx.setLineDash([2,3]);
      ctx.beginPath(); ctx.arc(tbX,fwY,radPx,0,Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
      ctx.globalAlpha = 1;

      // ラベル（選択中のみ表示）
      if(isSelected){
        ctx.fillStyle = color;
        ctx.font = '8px Space Mono,monospace';
        ctx.textAlign = 'left';
        ctx.globalAlpha = 0.9;
        ctx.fillText(`${tb.name} ${numStr}号`, tbX+radPx+3, fwY-2);
        ctx.globalAlpha = 1;
      }
    });

    // 筒場→花火の軌跡点線（選択中のみ）
    if(isSelected){
      const topRow = tb.nums.reduce((best,n)=>{
        const rr=db.numTable.find(r=>r.num===n);
        return(rr&&rr.height>(best?best.height:0))?rr:best;
      },null);
      if(topRow){
        const topY = toY(calcVA(distTb,simViewElev,tbElev,topRow.height)+camElOfs);
        ctx.strokeStyle=color; ctx.globalAlpha=0.2; ctx.lineWidth=0.8;
        ctx.setLineDash([2,4]);
        ctx.beginPath(); ctx.moveTo(tbX,tbBaseY); ctx.lineTo(tbX,topY); ctx.stroke();
        ctx.setLineDash([]); ctx.globalAlpha=1;
      }
      // 筒場マーカー
      ctx.fillStyle=color; ctx.globalAlpha=0.8;
      ctx.beginPath(); ctx.arc(tbX,tbBaseY,4,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
    }
  });

  // 情報テキスト
  const _fidInfo = document.getElementById('sel-festival').value;
  const fName = (db.festivals.find(f=>f.id===(_fidInfo||fid))||{}).name||'';
  const azInfo = ((camAz%360)+360)%360;
  document.getElementById('sim-info').textContent =
    `方位:${azInfo.toFixed(0)}°  上下:${elOffDeg>0?"+":""}${elOffDeg}°  焦点距離:${focal}mm | ${fName} × ${tg.name}`;

  // 地図連携ボタン更新
  updateMapBtns(simViewLat, simViewLng, camAz*r);
  if(viewManual) updateViewLabel();
  renderDiag();
}


// ==================== 断面図 ====================
function renderDiag(){
  const canvas= document.getElementById('diag-canvas');
  if(!canvas) return;
  if(!canvas.width || canvas.width===0) return; // layout()待ち
  const W = canvas.width;
  const H = canvas.height;
  if(W===0||H===0) return;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle='#060810'; ctx.fillRect(0,0,W,H);

  const fid = document.getElementById('sel-festival').value;
  const tid = document.getElementById('sel-target').value;
  if(!fid||!tid||!viewManual||viewLat===null){
    ctx.fillStyle='#7a82a0'; ctx.font='8px Space Mono,monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('視点・大会・対象物を', W/2, H/2-7);
    ctx.fillText('選択してください', W/2, H/2+7);
    ctx.textBaseline='alphabetic'; return;
  }

  const tg    = db.targets.find(x=>x.id===tid);
  const tubes = db.tubes.filter(t=>t.festivalId===fid);
  const selTubeId = document.getElementById('sel-tube') ? document.getElementById('sel-tube').value : '';
  const tube  = selTubeId ? tubes.find(t=>t.id===selTubeId)||tubes[0] : tubes[0];
  if(!tg||!tube) return;

  // ── 座標系 ──
  // 横軸：視点を原点(0)、右方向＝筒場方向
  // 縦軸：標高(m)
  const simViewElev = viewElev||0;
  const tubeElev    = tube.elev||0;
  const tgElev      = tg.elev||0;

  const distTube = hav(viewLat,viewLng,tube.lat,tube.lng);  // km
  const distTg   = hav(viewLat,viewLng,tg.lat,tg.lng);      // km
  // 視点から見て筒場・対象どちらが近いかで横軸方向を決定
  // 横軸：視点=0、筒場・対象をkm換算でプロット
  // 視点→筒場方向を正とし、対象は負側にくることもある
  const azTube = brng(viewLat,viewLng,tube.lat,tube.lng);
  const azTg   = brng(viewLat,viewLng,tg.lat,tg.lng);
  // 対象が筒場と同じ側か逆側かを方位差で判定
  const azDiff = ((azTg - azTube + 540)%360) - 180;
  const tgSign = Math.cos(azDiff*Math.PI/180) >= 0 ? 1 : -1;

  const xTube = distTube * 1000;           // m（正）
  const xTg   = distTg * 1000 * tgSign;   // m（対象の向き）

  // 各号数の花火頂点高さ
  const numRows = tube.nums.map(n=>db.numTable.find(r=>r.num===n)).filter(Boolean);

  // 全ポイントのx・yからスケール計算（開花半径を含める）
  const maxDiaHalf = Math.max(...numRows.map(r=>r.dia/2), 0);
  const allX = [0, xTube - maxDiaHalf, xTube + maxDiaHalf, xTg];
  const allY = [simViewElev,
                tubeElev,
                tubeElev + Math.max(...numRows.map(r=>r.height + r.dia/2), 0),
                tubeElev + Math.max(...numRows.map(r=>r.height - r.dia/2), 0),
                tgElev, tgElev + tg.height];
  const xMin = Math.min(...allX); const xMax = Math.max(...allX);
  const yMin = Math.min(...allY); const yMax = Math.max(...allY);

  // マージン
  const ML=38, MR=12, MT=20, MB=36;
  const PW = W - ML - MR;
  const PH = H - MT - MB;

  const xRange = (xMax - xMin)||1;
  const yRange = (yMax - yMin)||1;
  // 余白（開花円が端に掛からないよう）
  const xPad = xRange * 0.08;
  const yPad = yRange * 0.15;
  const xLo = xMin - xPad; const xHi = xMax + xPad;
  const yLo = yMin - yPad;
  const yHi = yMax + yPad;

  function toCanvasX(xm){ return ML + (xm - xLo) / (xHi - xLo) * PW; }
  function toCanvasY(ym){ return MT + PH - (ym - yLo) / (yHi - yLo) * PH; }

  // ── グリッド ──
  ctx.strokeStyle='rgba(37,42,64,0.6)'; ctx.lineWidth=0.5;
  // 水平グリッド（高さ）
  const yStep = niceStep(yHi - yLo, 4);
  const yStart = Math.ceil(yLo/yStep)*yStep;
  for(let y=yStart; y<=yHi; y+=yStep){
    const cy2 = toCanvasY(y);
    ctx.beginPath(); ctx.moveTo(ML,cy2); ctx.lineTo(W-MR,cy2); ctx.stroke();
    ctx.fillStyle='rgba(122,130,160,0.7)'; ctx.font='7px Space Mono,monospace';
    ctx.textAlign='right'; ctx.textBaseline='middle';
    ctx.fillText(y.toFixed(0)+'m', ML-3, cy2);
  }
  // 縦軸ゼロ線（地面基準）
  ctx.strokeStyle='rgba(200,169,110,0.25)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ML,toCanvasY(0)); ctx.lineTo(W-MR,toCanvasY(0)); ctx.stroke();

  // ── 地面ライン ──
  ctx.strokeStyle='rgba(122,130,160,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(ML, toCanvasY(yLo)); ctx.lineTo(W-MR, toCanvasY(yLo)); ctx.stroke();

  // ── 仰角ライン（視点→花火各頂点） ──
  const CV_COLORS=['#e8874a','#f5c842','#7eb8e8','#e87ea8','#7ee8b0','#c87ef5'];
  numRows.forEach((row,ni)=>{
    const fwX = xTube;
    const fwY = tubeElev + row.height;
    const vaFW = Math.atan2(fwY - simViewElev, fwX)*180/Math.PI;
    const color = CV_COLORS[ni % CV_COLORS.length];
    // 視点→花火頂点の仰角ライン
    ctx.strokeStyle=color; ctx.globalAlpha=0.5; ctx.lineWidth=0.8;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(toCanvasX(0), toCanvasY(simViewElev));
    ctx.lineTo(toCanvasX(fwX), toCanvasY(fwY));
    ctx.stroke(); ctx.setLineDash([]); ctx.globalAlpha=1;
    // 仰角ラベル
    ctx.fillStyle=color; ctx.font='7px Space Mono,monospace';
    ctx.textAlign='left'; ctx.textBaseline='bottom';
    ctx.fillText(`${row.num}号 ${vaFW.toFixed(1)}°`,
      toCanvasX(fwX)+3, toCanvasY(fwY)-2);
  });

  // ── 仰角ライン（視点→対象頂点） ──
  const tgTopY = tgElev + tg.height;
  const vaTg = Math.atan2(tgTopY - simViewElev, xTg)*180/Math.PI;
  ctx.strokeStyle='rgba(126,184,232,0.6)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
  ctx.beginPath();
  ctx.moveTo(toCanvasX(0), toCanvasY(simViewElev));
  ctx.lineTo(toCanvasX(xTg), toCanvasY(tgTopY));
  ctx.stroke(); ctx.setLineDash([]);

  // ── 対象物シルエット ──
  const tgCX = toCanvasX(xTg);
  const tgCYbase = toCanvasY(tgElev);
  const tgCYtop  = toCanvasY(tgTopY);
  const tgCW = Math.max(4, PW*0.04);
  ctx.fillStyle='rgba(126,184,232,0.2)';
  ctx.strokeStyle='rgba(126,184,232,0.7)'; ctx.lineWidth=1.2;
  ctx.fillRect(tgCX-tgCW/2, tgCYtop, tgCW, tgCYbase-tgCYtop);
  ctx.strokeRect(tgCX-tgCW/2, tgCYtop, tgCW, tgCYbase-tgCYtop);

  // ── 筒場＋花火 ──
  const tbCX = toCanvasX(xTube);
  // 各号数：軌跡＋開花径点線円
  numRows.forEach((row,ni)=>{
    const fwCY = toCanvasY(tubeElev + row.height);
    const color = CV_COLORS[ni % CV_COLORS.length];
    // 上昇軌跡（点線）
    ctx.strokeStyle=color; ctx.globalAlpha=0.35; ctx.lineWidth=0.8;
    ctx.setLineDash([2,3]);
    ctx.beginPath(); ctx.moveTo(tbCX, toCanvasY(tubeElev)); ctx.lineTo(tbCX, fwCY); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
    // 開花径：点線正円（縦方向のスケールを正として半径計算）
    const radYpx = Math.abs(toCanvasY(tubeElev + row.height - row.dia/2) - toCanvasY(tubeElev + row.height));
    const radPx  = Math.max(3, radYpx);
    ctx.strokeStyle=color; ctx.globalAlpha=0.7; ctx.lineWidth=1.2;
    ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.arc(tbCX, fwCY, radPx, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]); ctx.globalAlpha=1;
    // 中心点
    ctx.fillStyle=color;
    ctx.beginPath(); ctx.arc(tbCX, fwCY, 2.5, 0, Math.PI*2); ctx.fill();
  });
  // 地面マーカー（花火の後に描いて上に重なるように）
  ctx.fillStyle='#e8874a';
  ctx.beginPath(); ctx.arc(tbCX, toCanvasY(tubeElev), 4, 0, Math.PI*2); ctx.fill();

  // ── 視点マーカー ──
  const vpCX = toCanvasX(0);
  const vpCY = toCanvasY(simViewElev);
  ctx.fillStyle='#ffffff';
  ctx.beginPath(); ctx.arc(vpCX, vpCY, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(37,42,64,0.8)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(vpCX, vpCY, 4, 0, Math.PI*2); ctx.stroke();

  // ── 画角ライン（焦点距離＋上下スライダーから計算） ──
  if(gCamAlpha !== null && gFovV !== null){
    const camAlphaDeg = gCamAlpha;   // 光軸仰角(deg)
    const halfFovV    = gFovV / 2;   // 垂直画角の半分(deg)
    const vaUpper = camAlphaDeg + halfFovV;  // 上端仰角
    const vaLower = camAlphaDeg - halfFovV;  // 下端仰角

    // 断面図の右端xまで延長
    const xRight = xMax + xRange * 0.05;

    // 上端・下端それぞれの高さを距離xから計算
    // y = simViewElev + tan(仰角) * x
    const upperYatRight = simViewElev + Math.tan(vaUpper * Math.PI/180) * xRight;
    const lowerYatRight = simViewElev + Math.tan(vaLower * Math.PI/180) * xRight;

    // 上端ライン（黄緑）
    ctx.strokeStyle='rgba(200,230,100,0.7)'; ctx.lineWidth=1.2; ctx.setLineDash([3,2]);
    ctx.beginPath();
    ctx.moveTo(vpCX, vpCY);
    ctx.lineTo(toCanvasX(xRight), toCanvasY(upperYatRight));
    ctx.stroke();

    // 下端ライン（黄緑）
    ctx.beginPath();
    ctx.moveTo(vpCX, vpCY);
    ctx.lineTo(toCanvasX(xRight), toCanvasY(lowerYatRight));
    ctx.stroke();
    ctx.setLineDash([]);

    // 画角の塗りつぶし（淡く）
    ctx.beginPath();
    ctx.moveTo(vpCX, vpCY);
    ctx.lineTo(toCanvasX(xRight), toCanvasY(upperYatRight));
    ctx.lineTo(toCanvasX(xRight), toCanvasY(lowerYatRight));
    ctx.closePath();
    ctx.fillStyle='rgba(200,230,100,0.05)';
    ctx.fill();

    // 上下端ラベル
    ctx.fillStyle='rgba(200,230,100,0.85)'; ctx.font='7px Space Mono,monospace';
    ctx.textAlign='left'; ctx.textBaseline='middle';
    const lblX = toCanvasX(xRight) + 2;
    if(lblX < W - 2){
      ctx.fillText(`+${halfFovV.toFixed(1)}°`, lblX, toCanvasY(upperYatRight));
      ctx.fillText(`-${halfFovV.toFixed(1)}°`, lblX, toCanvasY(lowerYatRight));
    }
    // 光軸ライン（薄く）
    const axisYatRight = simViewElev + Math.tan(camAlphaDeg * Math.PI/180) * xRight;
    ctx.strokeStyle='rgba(200,230,100,0.3)'; ctx.lineWidth=0.8; ctx.setLineDash([1,3]);
    ctx.beginPath();
    ctx.moveTo(vpCX, vpCY);
    ctx.lineTo(toCanvasX(xRight), toCanvasY(axisYatRight));
    ctx.stroke(); ctx.setLineDash([]);
  }

  // ── X軸ラベル（距離） ──
  ctx.fillStyle='rgba(122,130,160,0.8)'; ctx.font='7px Space Mono,monospace';
  ctx.textAlign='center'; ctx.textBaseline='top';
  // 視点
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.fillText('視点', vpCX, H-MB+4);
  // 筒場
  ctx.fillStyle='#e8874a';
  const tbLabel = distTube<1 ? Math.round(distTube*1000)+'m' : distTube.toFixed(2)+'km';
  ctx.fillText(tube.name, tbCX, H-MB+4);
  ctx.fillText(tbLabel, tbCX, H-MB+13);
  // 対象
  ctx.fillStyle='rgba(126,184,232,0.9)';
  const tgLabel = distTg<1 ? Math.round(distTg*1000)+'m' : distTg.toFixed(2)+'km';
  ctx.fillText(tg.name, tgCX, H-MB+4);
  ctx.fillText(tgLabel, tgCX, H-MB+13);

  // ── 対象頂点の仰角ラベル ──
  ctx.fillStyle='rgba(126,184,232,0.9)'; ctx.font='7px Space Mono,monospace';
  ctx.textAlign='left'; ctx.textBaseline='bottom';
  ctx.fillText(`対象 ${vaTg.toFixed(1)}°`, tgCX+3, toCanvasY(tgTopY)-2);
}

function niceStep(range, targetSteps){
  const rough = range / targetSteps;
  const mag = Math.pow(10, Math.floor(Math.log10(rough)));
  const norm = rough / mag;
  let step;
  if(norm < 1.5) step = 1;
  else if(norm < 3.5) step = 2;
  else if(norm < 7.5) step = 5;
  else step = 10;
  return step * mag;
}

function updateMapBtns(simViewLat, simViewLng, azRad){
  if(simViewLat===null||simViewLat===undefined) return;
  const lat  = simViewLat.toFixed(6);
  const lng  = simViewLng.toFixed(6);
  // 画角（焦点距離から計算）
  const focal = parseFloat(document.getElementById('sl-focal').value);
  const fovDeg = Math.round(Math.min(90, Math.max(10, 2*Math.atan(36/(2*focal))*180/Math.PI)));
  // 方位角（ラジアン→度、北基準時計回り）
  const azDeg  = ((azRad * 180 / Math.PI) % 360 + 360) % 360;
  const mapsUrl = `https://www.google.com/maps?q=${lat},${lng}`;
  const svUrl   = `https://www.google.com/maps/@${lat},${lng},3a,${fovDeg}y,${azDeg.toFixed(1)}h,90t/data=!3m1!1e1`;
  const btns = document.getElementById('map-btns');
  if(!btns) return;
  btns.style.display = 'flex';
  document.getElementById('map-btn-gmap').href = mapsUrl;
  document.getElementById('map-btn-sv').href   = svUrl;
}

function escH(s){

}

// GoogleマップURL・座標文字列から緯度経度を抽出し地図を移動
async function extractAndApplyMapsURL(rawText){
  function isValidCoord(lat,lng){
    return isFinite(lat)&&isFinite(lng)&&lat>=-90&&lat<=90&&lng>=-180&&lng<=180&&(Math.abs(lat)+Math.abs(lng))>0.01;
  }
  function applyCoords(lat,lng){
    if(!isValidCoord(lat,lng))return false;
    if(map) map.setView([lat,lng],15);
    return true;
  }
  function extractCoords(text){
    let dec=text;
    try{dec=decodeURIComponent(text);}catch(e){dec=text;}
    let dec2=dec;
    try{dec2=decodeURIComponent(dec);}catch(e){dec2=dec;}
    function search(pattern,...texts){
      for(const t of texts){const m=pattern.exec(t);if(m)return m;}
      return null;
    }
    const dmsRe=/(\d+)[\u00b0\u00ba]\s*(\d+)['\u2019\u2032]\s*(\d+(?:\.\d+)?)["\u201d\u2033]\s*([NSns])\s*[,+\uff0c]?\s*(\d+)[\u00b0\u00ba]\s*(\d+)['\u2019\u2032]\s*(\d+(?:\.\d+)?)["\u201d\u2033]\s*([EWew])/;
    const dmsConv=(d,m,s,h)=>{const v=+d+(+m)/60+(+s)/3600;return(h==="S"||h==="W")?-v:v;};
    function tryDms(src){
      const mm=dmsRe.exec(src);if(!mm)return null;
      const lat=dmsConv(mm[1],mm[2],mm[3],mm[4].toUpperCase());
      const lng=dmsConv(mm[5],mm[6],mm[7],mm[8].toUpperCase());
      return isValidCoord(lat,lng)?[lat,lng]:null;
    }
    const isURL=text.startsWith("http")||text.includes("goo.gl");
    if(isURL){
      let m;
      m=search(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/,dec,dec2); if(m)return[+m[1],+m[2]];
      m=search(/!8m2!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/,dec,dec2); if(m)return[+m[1],+m[2]];
      m=search(/!3d(-?\d+\.\d+)[^!]*!2d(-?\d+\.\d+)/,dec2); if(m){const lat=+m[1],lng=+m[2];if(isValidCoord(lat,lng))return[lat,lng];}
      m=search(/!2d(-?\d+\.\d+)[^!]*!3d(-?\d+\.\d+)/,dec2); if(m){const lng2=+m[1],lat=+m[2];if(isValidCoord(lat,lng2))return[lat,lng2];}
      const r5=tryDms(dec)||tryDms(dec2); if(r5)return r5;
      m=search(/[?&]q=(-?\d+\.\d+),(-?\d+\.\d+)/,dec,dec2); if(m)return[+m[1],+m[2]];
      m=search(/\/place\/(-?\d+\.\d+),(-?\d+\.\d+)/,dec,dec2); if(m)return[+m[1],+m[2]];
      m=search(/[?&]ll=(-?\d+\.\d+),(-?\d+\.\d+)/,dec,dec2); if(m)return[+m[1],+m[2]];
      m=search(/@(-?\d+\.\d+),(-?\d+\.\d+)/,dec,dec2); if(m)return[+m[1],+m[2]];
    } else {
      const r=tryDms(dec)||tryDms(dec2); if(r)return r;
      const mm=search(/\(?\s*(-?\d+\.\d+)\s*,\s*(-?\d+\.\d+)\s*\)?/,dec,dec2);
      if(mm){const lat=+mm[1],lng=+mm[2];if(isValidCoord(lat,lng))return[lat,lng];}
    }
    for(const src of [dec,dec2]){
      const allCoords=[...src.matchAll(/(-?\d{1,3}\.\d{5,})/g)].map(x=>+x[1]);
      for(let i=0;i<allCoords.length-1;i++){
        const lat=allCoords[i],lng=allCoords[i+1];
        if(lat>=24&&lat<=46&&lng>=122&&lng<=154)return[lat,lng];
      }
      for(let i=0;i<allCoords.length-1;i++){
        const lat=allCoords[i],lng=allCoords[i+1];
        if(isValidCoord(lat,lng)&&Math.abs(lng)>90)return[lat,lng];
      }
    }
    return null;
  }
  const direct=extractCoords(rawText);
  if(direct&&applyCoords(direct[0],direct[1]))return true;
  if(!rawText.includes("maps.app.goo.gl")&&!rawText.includes("goo.gl"))return false;
  let fetchURL=rawText.trim().replace(/[?&]g_st=[^&]*/g,"").replace(/[?&]+$/,"");
  try{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),5000);
    const res=await fetch("https://corsproxy.io/?"+encodeURIComponent(fetchURL),{redirect:"follow",signal:ctrl.signal});
    clearTimeout(tid);
    let body=await res.text();
    if(res.url) body=res.url+" "+body;
    const coords=extractCoords(body);
    if(coords&&applyCoords(coords[0],coords[1]))return true;
  }catch(e){console.warn("[Maps]",e.message||e);}
  return false;
}

// ==================== 天文・地理計算 ====================
// 水平距離(km) Haversine
function hav(a,b,c,d){
  const R=6371,r=Math.PI/180;
  const dA=(c-a)*r,dB=(d-b)*r;
  const x=Math.sin(dA/2)**2+Math.cos(a*r)*Math.cos(c*r)*Math.sin(dB/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
// 方位角(°)
function brng(a,b,c,d){
  const r=Math.PI/180,dl=(d-b)*r;
  const y=Math.sin(dl)*Math.cos(c*r);
  const x=Math.cos(a*r)*Math.sin(c*r)-Math.sin(a*r)*Math.cos(c*r)*Math.cos(dl);
  return((Math.atan2(y,x)*180/Math.PI)+360)%360;
}
// 国土地理院 標高API
async function getElev(lat,lng){
  try{
    const r=await fetch(`https://cyberjapandata2.gsi.go.jp/general/dem/scripts/getelevation.php?lon=${lng.toFixed(6)}&lat=${lat.toFixed(6)}&outtype=JSON`);
    const j=await r.json();
    return(j.elevation!==null&&isFinite(j.elevation))?j.elevation:0;
  }catch{return 0;}
}

// ==================== リサイズ ====================
function setCompMode(o){
  if(o!=='land'&&o!=='port') return;
  compMode=o;
  document.getElementById('btn-land').classList.toggle('on', o==='land');
  document.getElementById('btn-port').classList.toggle('on', o==='port');
  layout();
}

function layout(){
  const simPanel  = document.getElementById('sim-panel');
  const cvWrap    = document.getElementById('cv-wrap');
  const cvClip    = document.getElementById('cv-clip');
  const canvas    = document.getElementById('sim-canvas');
  const diagWrap  = document.getElementById('diag-wrap');
  const diagCanvas= document.getElementById('diag-canvas');
  if(!simPanel||!cvWrap||!cvClip||!canvas) return;

  const isPort = compMode==='port';

  // 全体サイズ（現行ツールと同方式）
  const W = window.innerWidth;
  const H = window.innerHeight;
  const hdrH  = document.getElementById('hdr').offsetHeight||40;
  const pnlW  = document.getElementById('pnl').offsetWidth||210;
  const hdrSim= document.getElementById('sim-header').offsetHeight||32;
  const avH_total = H - hdrH;
  const rightW    = W - pnlW;

  // sim-panelの高さは全体の45%（横構図基準）
  const pvPanelH_land = Math.round(avH_total * 0.45);
  const lblH = 0; // ラベル行なし（sim-headerがラベル代わり）

  // ── 横構図基準のcanvasサイズ（現行ツールと同方式） ──
  // cvH_landを先に決め、cvW_land = cvH_land * 3/2
  const cvH_land = pvPanelH_land - hdrSim;
  const cvW_land = Math.round(cvH_land * 3/2);

  // 縦構図: 90度回転 → W↔H入れ替え
  const cvW_port = cvH_land;
  const cvH_port = cvW_land;

  const cvW = isPort ? cvW_port : cvW_land;
  const cvH = isPort ? cvH_port : cvH_land;

  // 縦構図はパネル高さが増える（現行ツールと同方式）
  const pvPanelH = isPort ? cvH_port + hdrSim : pvPanelH_land;

  // diagWは残り全部（現行ツールと同方式: rightW - cvW）
  const diagW = Math.max(80, rightW - cvW);
  const diagH = pvPanelH - hdrSim;

  // sim-panel高さ強制セット
  simPanel.style.height = pvPanelH + 'px';

  // cv-wrap幅をcvWに固定（余白なし）
  cvWrap.style.width    = cvW + 'px';
  cvWrap.style.flexShrink = '0';
  cvWrap.style.flexGrow   = '0';

  // canvas・cv-clip強制セット
  canvas.width  = cvW; canvas.height = cvH;
  canvas.style.cssText = `width:${cvW}px!important;height:${cvH}px!important;display:block;background:#060810;flex-shrink:0;flex-grow:0;`;
  cvClip.style.cssText = `width:${cvW}px;height:${cvH}px;overflow:hidden;flex-shrink:0;flex-grow:0;border:1.5px solid var(--ac);box-sizing:border-box;`;

  // diag-wrap・diag-canvas強制セット
  if(diagWrap && diagCanvas){
    diagCanvas.width=diagW; diagCanvas.height=diagH;
    diagCanvas.style.cssText=`width:${diagW}px!important;height:${diagH}px!important;display:block;background:#060810;flex-shrink:0;flex-grow:0;`;
    diagWrap.style.width  = diagW + 'px';
    diagWrap.style.height = pvPanelH + 'px';
    diagWrap.style.flex   = 'none';
  }

  if(map) map.invalidateSize();
  renderSim();
  renderDiag();
}

function onResize(){
  if(map) map.invalidateSize();
  layout();
}
window.addEventListener('resize', onResize);

// ==================== 初期化 ====================
function init(){
  loadDB();
  initMap();
  refreshFestivalSelects();
  refreshTargetSelects();
  refreshTubeSelect();
  onSlider();
  // layoutはDOMが確定してから（requestAnimationFrame）
  requestAnimationFrame(()=>layout());
  // スマホ判定
  if(/Mobi|Android|iPhone|iPad/i.test(navigator.userAgent)){
    document.getElementById('pnl-close').style.display='block';
    document.getElementById('mob-bar').style.display='flex';
  }
}
init();
